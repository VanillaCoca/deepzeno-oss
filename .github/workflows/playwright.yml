name: Playwright Tests
on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Run inside Microsoft's official Playwright image, which ships the browsers
    # preinstalled. The runtime `playwright install` download from
    # cdn.playwright.dev measured ~48 KB/s (~165 MiB => ~60 min), so the job hit
    # its timeout before tests ran, no matter how high the cap. This image is
    # pulled from mcr.microsoft.com (fast on Azure runners) with the browser
    # baked in, so there is no cdn.playwright.dev download at all.
    # IMPORTANT: keep this tag in sync with @playwright/test in package.json
    # (currently 1.51.0); a version mismatch makes Playwright re-download.
    container:
      image: mcr.microsoft.com/playwright:v1.51.0-jammy
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Browsers are preinstalled in the container image (see `container:` above),
      # so no `playwright install` download step is needed.
      - name: Run Playwright tests
        run: pnpm test

      - uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
